name: Build Droidspaces Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            make bc libssl-dev \
            libelf-dev bison flex \
            python3 zip unzip wget

      - name: Download kernel source
        run: |
          wget -O Kernel.tar.gz \
            "https://github.com/Moonknight982/SM-A13F-KERNELSOURCE/releases/download/v1/Kernel.tar.gz"

      - name: Extract kernel source
        run: |
          mkdir -p kernel_src
          tar -xzf Kernel.tar.gz -C kernel_src

      - name: Apply Droidspaces config patches
        run: |
          cd kernel_src
          DEFCONFIG=arch/arm64/configs/exynos850-a13xx_defconfig
          sed -i 's/# CONFIG_USER_NS is not set/CONFIG_USER_NS=y/' $DEFCONFIG
          sed -i 's/# CONFIG_CGROUP_PIDS is not set/CONFIG_CGROUP_PIDS=y/' $DEFCONFIG
          sed -i 's/# CONFIG_CGROUP_DEVICE is not set/CONFIG_CGROUP_DEVICE=y/' $DEFCONFIG
          sed -i 's/# CONFIG_CHECKPOINT_RESTORE is not set/CONFIG_CHECKPOINT_RESTORE=y/' $DEFCONFIG
          sed -i 's/# CONFIG_FHANDLE is not set/CONFIG_FHANDLE=y/' $DEFCONFIG
          grep -q "CONFIG_IPC_NS" $DEFCONFIG || echo "CONFIG_IPC_NS=y" >> $DEFCONFIG
          echo "=== Verifying ==="
          grep -E "USER_NS|IPC_NS|CGROUP_PIDS|CGROUP_DEVICE|CHECKPOINT|FHANDLE" $DEFCONFIG

      - name: Setup toolchain
        run: |
          sudo apt-get install -y clang-12 lld-12 llvm-12
          cd kernel_src
          mkdir -p toolchain/clang/host/linux-x86/clang-r383902/bin
          ln -s $(which clang-12) toolchain/clang/host/linux-x86/clang-r383902/bin/clang
          ln -s $(which ld.lld-12) toolchain/clang/host/linux-x86/clang-r383902/bin/ld.lld
          ln -s $(which llvm-ar-12) toolchain/clang/host/linux-x86/clang-r383902/bin/llvm-ar
          ln -s $(which llvm-nm-12) toolchain/clang/host/linux-x86/clang-r383902/bin/llvm-nm
          ln -s $(which llvm-objcopy-12) toolchain/clang/host/linux-x86/clang-r383902/bin/llvm-objcopy
          ln -s $(which llvm-strip-12) toolchain/clang/host/linux-x86/clang-r383902/bin/llvm-strip

      - name: Fix Kconfig issues
        run: |
          echo "=== Mali Kconfig problematic lines ==="
          sed -n '25,32p' kernel_src/drivers/gpu/arm/Kconfig
          echo "=== NPU Kconfig first line ==="
          head -3 kernel_src/drivers/vision/npu/Kconfig
      
      - name: Build kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang-12
          export HOSTCC=gcc
          export ANDROID_MAJOR_VERSION=t
          make CC=clang-12 HOSTCC=gcc exynos850-a13xx_defconfig
          make CC=clang-12 HOSTCC=gcc -j$(nproc) Image

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: kernel_src/arch/arm64/boot/Image
          retention-days: 7
